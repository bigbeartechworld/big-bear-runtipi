# Configuration for cyberchef setup

# Name of the big-bear-cyberchef application
# Service definitions for the big-bear-cyberchef application
services:
  cyberchef:
    # Name of the container
    container_name: cyberchef
    # Image to be used for the container
    image: ghcr.io/gchq/cyberchef:11.0.0@sha256:45082a0ac41d6beeea2daeb192d8b20c66520362854542f4fe340aab37635f66
    # Container restart policy
    restart: unless-stopped
    # Ports mapping between host and container
    ports:
      # Mapping port 8080 of the host to port 8080 of the container
      - "${APP_PORT}:8080"
    labels:
      runtipi.managed: "true"
    networks:
      - tipi_main_network
networks:
  tipi_main_network:
    external: true
