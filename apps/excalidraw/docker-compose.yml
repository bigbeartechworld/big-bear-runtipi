# Configuration for excalidraw setup

# Application Name
# Services used in the application
services:
  excalidraw:
    # Name of the container
    container_name: excalidraw
    # Docker image to be used
    image: excalidraw/excalidraw:latest@sha256:f7ee194addd607bf831d2af0f0a34463dd4225e426cf35199ef0b12a803398e9
    # Restart policy for the service
    restart: unless-stopped
    # Port mappings for the service
    ports:
      - "${APP_PORT}:80"
    labels:
      runtipi.managed: "true"
    networks:
      - tipi_main_network
networks:
  tipi_main_network:
    external: true
