# Configuration for open-webui setup

# Name of the big-bear-open-webui application
# Service definitions for the big-bear-open-webui application
services:
  open-webui:
    # Name of the container
    container_name: open-webui
    # Image to be used for the container
    image: ghcr.io/open-webui/open-webui:git-33e54a9@sha256:b1f3fdcbe97af8b282cecbc550339e55e032d37f6c5aeb1635457a209ec5d42f
    # Container restart policy
    restart: unless-stopped
    # Volumes to be mounted to the container
    volumes:
      - ${APP_DATA_DIR}/data:/app/backend/data
    # Environment variables
    environment:
      - OLLAMA_BASE_URL=
      - OPENAI_API_KEY=
    # Ports mapping between host and container
    ports:
      # Mapping port 8080 of the host to port 8080 of the container
      - "${APP_PORT}:8080"
    labels:
      runtipi.managed: "true"
    networks:
      - tipi_main_network
networks:
  tipi_main_network:
    external: true
