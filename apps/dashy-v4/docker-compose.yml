# Configuration for Dashy v4 setup

# DASHY V4.0.8 - NEW DEPLOYMENT
# ================================
# This is a SEPARATE app from 'dashy' (v3.3.1). They can coexist.
#
# FOR NEW INSTALLATIONS:
# - Deploy this app for new Dashy instances
# - Uses v4 architecture with /app/user-data config directory
# - Runs as non-root (uid/gid 1000)
#
# FOR MIGRATION FROM V3:
# - Do NOT uninstall your existing 'dashy' v3 app
# - Deploy this as NEW app alongside v3
# - Copy your conf.yml: docker cp big-bear-dashy:/app/public/conf.yml ./conf.yml
# - Place conf.yml in the new volume at /app/user-data/conf.yml
# - Breaking changes: /app/public -> /app/user-data, healthcheck path updated
# - Config schema changes: pageInfo.footerText -> pageInfo.footer
#
# Detailed migration: https://github.com/Lissy93/dashy/blob/master/docs/changelog.md

# Name of the big-bear-dashy-v4 application
# Service definitions for the dashy-v4 application
services:
  dashy-v4:
    # Image to be used for the app service
    image: lissy93/dashy:4.0.8@sha256:1b3de6159d93e1a75f0b808e74d8cb5100c06251b120abd2d68e557ec7544ab6
    # Name of the container
    container_name: dashy-v4
    volumes:
      - ${APP_DATA_DIR}/user-data:/app/user-data
    # Ports mapping
    ports:
      - ${APP_PORT}:8080
    # Set any environmental variables
    environment:
      - NODE_ENV=production
    # Restart policy for the container
    restart: unless-stopped
    # Configure healthchecks for the service
    healthcheck:
      test: ["CMD", "node", "/app/services/healthcheck.js"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      runtipi.managed: "true"
    networks:
      - tipi_main_network
networks:
  tipi_main_network:
    external: true
