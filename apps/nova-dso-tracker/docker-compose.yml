services:
  nova-dso-tracker:
    image: mrantonsg/nova-dso-tracker:6.2.0@sha256:eb5cd12f4c7627ec6e70051f4bccc5852db1efcd349402929b0c2cc0da2f1938
    container_name: nova-dso-tracker
    ports:
      - "${APP_PORT}:5001"
    volumes:
      - ${APP_DATA_DIR}/instance:/app/instance
    restart: unless-stopped
    network_mode: bridge
    labels:
      runtipi.managed: "true"
    networks:
      - tipi_main_network
networks:
  tipi_main_network:
    external: true
