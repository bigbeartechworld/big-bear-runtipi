services:
  nova-dso-tracker:
    image: mrantonsg/nova-dso-tracker:6.2.1@sha256:68ae939adebdcaa508c6f73b650fad7cf2555409ce835c088308f057a975c948
    container_name: nova-dso-tracker
    ports:
      - "${APP_PORT}:5001"
    volumes:
      - ${APP_DATA_DIR}/instance:/app/instance
    restart: unless-stopped
    network_mode: bridge
    labels:
      runtipi.managed: "true"
    networks:
      - tipi_main_network
networks:
  tipi_main_network:
    external: true
